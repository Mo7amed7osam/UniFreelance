services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unifreelance-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGO_URI: ${MONGO_URI:?Set MONGO_URI in .env to your MongoDB Atlas URI}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-unifreelance/interviews}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      INSTAPAY_RECEIVER_NUMBER: ${INSTAPAY_RECEIVER_NUMBER:-01146370900}
      UPLOADS_ROOT: ${UPLOADS_ROOT:-/app/uploads}
      TOPUP_UPLOADS_DIR: ${TOPUP_UPLOADS_DIR:-/app/private/topups}
    networks:
      - unifreelance-network
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/private/topups:/app/private/topups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: unifreelance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - unifreelance-network

networks:
  unifreelance-network:
    driver: bridge
