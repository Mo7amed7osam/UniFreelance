global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: backend-cloud
    metrics_path: /metrics
    static_configs:
      - targets:
          - gradproject-back-1776705847.francecentral.azurecontainer.io:5000
        labels:
          environment: azure
          service: backend

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115

  - job_name: blackbox-cloud
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://gradproject-back-1776705847.francecentral.azurecontainer.io:5000/health
          - https://frontend-beta-tan-86.vercel.app/
          - https://frontend-beta-tan-86.vercel.app/api/skills
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: promtail
    static_configs:
      - targets:
          - promtail:9080
