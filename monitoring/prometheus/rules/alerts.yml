groups:
  - name: availability
    rules:
      - alert: BackendMetricsUnavailable
        expr: up{job="backend-cloud"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Backend metrics endpoint is unavailable
          description: Prometheus cannot scrape backend metrics from the Azure deployment.

      - alert: CloudEndpointProbeFailed
        expr: probe_success{job="blackbox-cloud"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Endpoint probe failed
          description: Blackbox probe failed for {{ $labels.instance }}.

  - name: backend-performance
    rules:
      - alert: BackendHigh5xxRate
        expr: |
          sum(rate(shaghalny_backend_http_requests_total{job="backend-cloud",status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(shaghalny_backend_http_requests_total{job="backend-cloud"}[5m])), 0.001)
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Backend 5xx error rate is high
          description: More than 5% of backend responses are failing with 5xx over the last 10 minutes.

      - alert: BackendHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(shaghalny_backend_http_request_duration_seconds_bucket{job="backend-cloud"}[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Backend latency p95 is high
          description: Backend p95 latency is above 1 second for the last 10 minutes.

      - alert: MongoConnectionNotReady
        expr: shaghalny_backend_mongodb_connection_state{job="backend-cloud"} != 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: MongoDB connection is not ready
          description: Mongoose is reporting connection state {{ $value }} instead of connected.
